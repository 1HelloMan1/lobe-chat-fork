name: Upstream Sync

permissions:
  contents: write
  issues: write
  actions: write

on:
  schedule:
    - cron: '0 */3 * * *' # 每 6 小时自动同步
  workflow_dispatch:

jobs:
  sync_latest_from_upstream:
    name: Sync latest commits from upstream repo
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 可选调试用：检查 PAT 是否设置
      - name: Debug check PAT
        run: echo "Token Length: ${#{{ secrets.PAT_TOKEN }}}"

      # 自动关闭旧的同步失败 issue（标签为 🚨 Sync Fail）
      - name: Clean issue notice
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'close-issues'
          labels: '🚨 Sync Fail'

      # 执行同步操作
      - name: Sync upstream changes
        id: sync
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4
        with:
          upstream_sync_repo: lobehub/lobe-chat
          upstream_sync_branch: main
          target_sync_branch: main
          target_repo_token: ${{ secrets.PAT_TOKEN }}  # 使用你的 PAT Token
          test_mode: false

      # 如果同步失败，自动创建 issue 提醒你
      - name: Sync check
        if: failure()
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'create-issue'
          title: '🚨 同步失败 | Sync Fail'
          labels: '🚨 Sync Fail'
          body: |
            ❌ 本次自动同步失败。可能是由于 `.github/workflows/*` 文件变动，GitHub 默认不允许 GITHUB_TOKEN 更新 workflow 文件。

            请检查你的 Personal Access Token 是否具备 `workflow` 权限，并参照以下教程手动同步一次：

            [📘 中文教程][tutorial-zh-CN] | [📙 English Tutorial][tutorial-en-US]

            [tutorial-zh-CN]: https://github.com/lobehub/lobe-chat/wiki/Upstream-Sync.zh-CN
            [tutorial-en-US]: https://github.com/lobehub/lobe-chat/wiki/Upstream-Sync
